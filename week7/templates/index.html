<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 - 登入與查詢系統</title>
    <style>
        /* 基礎版面重置與置中設定 */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4; 
        }

        /* 整個畫面的外框容器 */
        .main-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 50px;
        }

        /* 天藍色標題區塊 */
        .header {
            background-color: #3d9de0; 
            color: white;
            text-align: center;
            padding: 25px 0;
            font-size: 32px;
            font-weight: bold;
        }

        /* 表單內容區塊 */
        .content {
            padding: 40px 20px;
            text-align: center;
        }

        .content h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            color: #555555;
        }

        /* 輸入框的排版 (使用 Flexbox 讓文字與輸入框水平對齊) */
        .form-group {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 50px; 
            text-align: right;
            margin-right: 15px;
            font-size: 18px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 220px;
            padding: 5px;
            border: 1px solid #aaa;
            font-size: 16px;
        }

        /* 同意條款區塊 */
        .checkbox-group {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 25px;
            font-size: 18px;
        }

        .checkbox-group input {
            margin-left: 10px;
            transform: scale(1.2); 
        }

        /* 按鈕樣式 */
        .submit-btn {
            padding: 8px 30px;
            font-size: 16px;
            background-color: #f8f9fa;
            border: 1px solid #aaa;
            border-radius: 2px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #e2e6ea;
        }

        /* 區塊分隔線 */
        .divider {
            border: 0;
            border-top: 1px solid #e0e0e0;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            歡迎光臨，請註冊登入系統
        </div>
        
        <div class="content">
            <h2>註冊帳號</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="signup-name" name="name">
                </div>

                <div class="form-group">
                    <label for="email">信箱</label>
                    <input type="text" id="signup-email" name="email">
                </div>
                
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="signup-password" name="password">
                </div>

                <button type="button" onclick="signup()" class="submit-btn">註冊</button>
            </form>
        </div>

        <hr class="divider">

        <div class="content">
            <h2>登入系統</h2>
            <form id="loginForm">
                    <div class="form-group">
                        <label for="email">信箱</label>
                        <input type="text" id="login-email" name="email">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密碼</label>
                        <input type="password" id="login-password" name="password">
                    </div>
                <button type="button" onclick="login()" class="submit-btn">登入</button>
            </form>
        </div>
    </div>

    <script>
        // --- (Task 2) ---
        async function signup(){
            let name = document.querySelector("#signup-name").value;
            let email = document.querySelector("#signup-email").value;
            let password = document.querySelector("#signup-password").value;

            // 增加空白檢查
            if (name === "" || email === "" || password === "") {
                alert("請輸入完整資訊");
                return; // 提早結束函式，不執行後面的 fetch
            }

            let response = await fetch("/signup",{
                method: "POST",
                headers: {
                    "Content-Type": "application/json" // 補上 JSON 標頭
                },
                body: JSON.stringify({"name":name,"email":email,"password":password})
            }); 

            let result = await response.json(); // 這時候後端確實回傳 JSON，解析就不會報錯

            if (result.ok){
                alert("註冊成功");
                window.location.href = "/"; // 前端手動跳轉回首頁
            } else{
                alert("註冊失敗");
                window.location.href = "/ohoh?msg=重複的電子郵件"; // 前端手動跳轉到錯誤頁
            }
        }
        // --- (Task 3) ---
        async function login(){
            let email = document.querySelector("#login-email").value;
            let password = document.querySelector("#login-password").value;

            // 增加空白檢查
            if (email === "" || password === "") {
                alert("請輸入完整資訊");
                return; // 提早結束函式，不執行後面的 fetch
            }

            let response = await fetch("/login",{
                method:"POST",
                headers: {
                    "Content-Type": "application/json" // 補上 JSON 標頭
                },
                body:JSON.stringify({"email":email,"password":password})
            }); 

            let result = await response.json();
            /*console.log("登入結果",result);*/  
            if (result.ok){
                alert("登入成功");
                window.location.href = "/member"; // 把使用者導向到會員頁面
            } else{
                alert("登入失敗");
                window.location.href = "/ohoh?msg=帳號、或密碼輸入錯誤"; // 前端手動跳轉到錯誤頁
            }
        } 


    </script>

</body>
</html>
