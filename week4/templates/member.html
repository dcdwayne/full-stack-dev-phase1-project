<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員成功登入頁面</title>
    <style>
        /* 基礎版面重置與置中設定 */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }

        /* 整個畫面的外框容器 */
        .main-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        /* 天藍色標題區塊 */
        .header {
            background-color: #3d9de0;
            color: white;
            text-align: center;
            padding: 25px 0;
            font-size: 32px;
            font-weight: bold;
        }

        /* 表單內容區塊 */
        .content {
            padding: 40px 20px;
            text-align: center;
        }

        .content h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            color: #555555;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="header">
            歡迎光臨，這是會員頁
        </div>
        <div class="content">
            <h2>恭喜您，成功登入系統</h2>
            <a href="/logout" class="logout-btn">登出系統</a>
        </div>
    </div>
</body>

</html>
